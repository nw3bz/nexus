name: Global Install Upgrade Smoke

# Catches regressions where `npm install -g gitnexus@<new>` fails to upgrade
# cleanly over a prior global install. Prior precedent: issue #836 and PR #843's
# incomplete fix slipped past CI because no global-upgrade test existed.
#
# Concurrency convention: see CONTRIBUTING.md → "GitHub Actions — Concurrency Convention".
# Literal "CIGU-" prefix (safe in reusable-workflow context, per ci.yml comments).

on:
  pull_request:
    paths:
      - 'gitnexus/package.json'
      - 'gitnexus/.npmignore'
      - 'gitnexus/scripts/**'
      - 'gitnexus/vendor/**'
      - '.github/workflows/ci-global-upgrade.yml'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && format('CIGU-{0}', github.ref) || format('CIGU-nested-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  global-upgrade:
    name: ${{ matrix.os }} / upgrade over ${{ matrix.prior }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is the reporter's platform (issue #836) and the highest-risk
        # surface for npm global-install rmdir behavior. Linux and Windows
        # provide cross-platform regression coverage.
        os: [macos-latest, ubuntu-latest, windows-latest]
        # Prior version that must be upgraded OVER. If this version changes,
        # update here. Should be a published rc that preceded the fix.
        prior: ['1.6.2-rc.8']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.3.0
        with:
          node-version: '22'

      - name: Install prior published version globally
        run: npm install -g gitnexus@${{ matrix.prior }}

      - name: Verify prior version installed
        run: gitnexus --version

      - name: Pack current branch
        working-directory: gitnexus
        run: |
          npm install
          npm pack
        shell: bash

      - name: Compute packed tarball path
        id: tarball
        working-directory: gitnexus
        run: |
          TARBALL=$(ls gitnexus-*.tgz | head -1)
          echo "path=$(pwd)/$TARBALL" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upgrade over prior version (the actual regression test)
        run: npm install -g "${{ steps.tarball.outputs.path }}"

      - name: Verify upgraded version runs
        run: gitnexus --version

      - name: Verify no vendor build artifacts block rmdir
        shell: bash
        run: |
          # Best-effort: locate the global install and confirm that vendor/
          # contains only source, not install-time artifacts.
          GLOBAL_PREFIX=$(npm root -g)
          if [ -d "$GLOBAL_PREFIX/gitnexus/vendor/tree-sitter-proto" ]; then
            echo "=== Contents of global vendor/tree-sitter-proto/ ==="
            ls -la "$GLOBAL_PREFIX/gitnexus/vendor/tree-sitter-proto/"
            if [ -d "$GLOBAL_PREFIX/gitnexus/vendor/tree-sitter-proto/node_modules" ]; then
              echo "::error::vendor/tree-sitter-proto/node_modules/ was created — upgrade hazard reintroduced"
              exit 1
            fi
            if [ -d "$GLOBAL_PREFIX/gitnexus/vendor/tree-sitter-proto/build" ]; then
              echo "::error::vendor/tree-sitter-proto/build/ was created — upgrade hazard reintroduced"
              exit 1
            fi
          fi

  ignore-scripts:
    name: ${{ matrix.os }} / --ignore-scripts degraded mode
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.3.0
        with:
          node-version: '22'

      - name: Pack current branch
        working-directory: gitnexus
        run: |
          npm install
          npm pack
        shell: bash

      - name: Compute packed tarball path
        id: tarball
        working-directory: gitnexus
        run: |
          TARBALL=$(ls gitnexus-*.tgz | head -1)
          echo "path=$(pwd)/$TARBALL" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Install globally with --ignore-scripts
        run: npm install -g --ignore-scripts "${{ steps.tarball.outputs.path }}"

      - name: Verify CLI boots without postinstall (proto parsing may be unavailable)
        run: gitnexus --version
